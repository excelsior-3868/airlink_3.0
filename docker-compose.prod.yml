name: airlink3-prod

# Production stack — optimized builds, code baked into images, no dev bind mounts.
#   docker compose -f docker-compose.prod.yml up -d --build
# Serves the SPA + API on http://localhost:${WEB_PORT:-8090} (nginx → php-fpm).
# Uses its own DB volume and internal-only DB/RADIUS ports so it can run
# alongside the dev stack.

services:
  mariadb:
    image: mariadb:11
    container_name: airlink-prod-mariadb
    restart: unless-stopped
    environment:
      MARIADB_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-root_secret}
      MARIADB_DATABASE: airlink
      MARIADB_USER: airlink
      MARIADB_PASSWORD: ${DB_PASSWORD:-airlink_pass}
    volumes:
      - mariadb_prod_data:/var/lib/mysql
      - ./docker/mariadb/initdb.d:/docker-entrypoint-initdb.d:ro
      - ./nalrd_backup.sql:/legacy/nalrd_backup.sql:ro
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 60s

  app:
    build:
      context: .
      dockerfile: docker/backend/Dockerfile.prod
    container_name: airlink-prod-app
    restart: unless-stopped
    environment:
      DB_CONNECTION: mysql
      DB_HOST: mariadb
      DB_PORT: 3306
      DB_DATABASE: airlink
      DB_USERNAME: airlink
      DB_PASSWORD: ${DB_PASSWORD:-airlink_pass}
      LEGACY_DB_HOST: mariadb
      LEGACY_DB_PORT: 3306
      LEGACY_DB_DATABASE: airlink_legacy
      LEGACY_DB_USERNAME: airlink
      LEGACY_DB_PASSWORD: ${DB_PASSWORD:-airlink_pass}
      APP_KEY: ${APP_KEY}
      APP_ENV: production
      APP_DEBUG: "false"
      RUN_MIGRATIONS: 1
    depends_on:
      mariadb:
        condition: service_healthy

  web:
    build:
      context: .
      dockerfile: docker/web/Dockerfile
    container_name: airlink-prod-web
    restart: unless-stopped
    ports:
      - "${WEB_PORT:-8090}:80"
    depends_on:
      - app

  queue:
    build:
      context: .
      dockerfile: docker/backend/Dockerfile.prod
    container_name: airlink-prod-queue
    restart: unless-stopped
    environment:
      DB_CONNECTION: mysql
      DB_HOST: mariadb
      DB_PORT: 3306
      DB_DATABASE: airlink
      DB_USERNAME: airlink
      DB_PASSWORD: ${DB_PASSWORD:-airlink_pass}
      LEGACY_DB_HOST: mariadb
      LEGACY_DB_PORT: 3306
      LEGACY_DB_DATABASE: airlink_legacy
      LEGACY_DB_USERNAME: airlink
      LEGACY_DB_PASSWORD: ${DB_PASSWORD:-airlink_pass}
      APP_KEY: ${APP_KEY}
      APP_ENV: production
      APP_DEBUG: "false"
      RUN_MIGRATIONS: 0
    command: ["php", "artisan", "queue:work", "--tries=3", "--timeout=120"]
    depends_on:
      - app

  scheduler:
    build:
      context: .
      dockerfile: docker/backend/Dockerfile.prod
    container_name: airlink-prod-scheduler
    restart: unless-stopped
    environment:
      DB_CONNECTION: mysql
      DB_HOST: mariadb
      DB_PORT: 3306
      DB_DATABASE: airlink
      DB_USERNAME: airlink
      DB_PASSWORD: ${DB_PASSWORD:-airlink_pass}
      LEGACY_DB_HOST: mariadb
      LEGACY_DB_PORT: 3306
      LEGACY_DB_DATABASE: airlink_legacy
      LEGACY_DB_USERNAME: airlink
      LEGACY_DB_PASSWORD: ${DB_PASSWORD:-airlink_pass}
      APP_KEY: ${APP_KEY}
      APP_ENV: production
      APP_DEBUG: "false"
      RUN_MIGRATIONS: 0
    command: ["php", "artisan", "schedule:work"]
    depends_on:
      - app

  freeradius:
    build:
      context: ./docker/freeradius
    container_name: airlink-prod-freeradius
    restart: unless-stopped
    ports:
      - "${RADIUS_AUTH_PORT:-1812}:1812/udp"
      - "${RADIUS_ACCT_PORT:-1813}:1813/udp"
    depends_on:
      mariadb:
        condition: service_healthy

volumes:
  mariadb_prod_data:
