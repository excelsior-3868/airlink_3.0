; Airlink v3.0 backend PHP overrides.
; Voucher card designs embed the background/logo images as base64 inside the
; JSON POST body, so the request body can be large. Keep these comfortably
; above the app-level 10MB image cap (base64 inflates ~33%).
post_max_size = 20M
upload_max_filesize = 20M
memory_limit = 256M
